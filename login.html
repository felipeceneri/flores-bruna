<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrunaFlores — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #030303;
      --surface:   rgba(255,255,255,0.04);
      --surface2:  rgba(255,255,255,0.07);
      --border:    rgba(255,255,255,0.1);
      --accent:    #6366f1;
      --accent-h:  #4f46e5;
      --danger:    #E24B4A;
      --success:   #3DAA6B;
      --text:      #E8ECF4;
      --text-2:    rgba(255,255,255,0.55);
      --text-3:    rgba(255,255,255,0.3);
      --radius:    10px;
      --shadow:    0 8px 40px rgba(0,0,0,.6);
      --font:      'Inter', system-ui, sans-serif;
      --transition: .18s ease;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
      overflow: hidden;
      position: relative;
    }

    button { font-family: var(--font); cursor: pointer; border: none; }
    input  { font-family: var(--font); }

    /* ── Background gradient overlay ── */
    .bg-gradient {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.05) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 50%, rgba(244,63,94,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    .bg-vignette {
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, rgba(3,3,3,0.7) 0%, transparent 30%, transparent 70%, rgba(3,3,3,0.8) 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Floating ellipse shapes ── */
    .shapes {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .shape {
      position: absolute;
      border-radius: 9999px;
      border: 2px solid rgba(255,255,255,0.13);
      backdrop-filter: blur(2px);
      opacity: 0;
      animation: shapeIn 2.4s forwards, float 12s ease-in-out infinite;
    }
    .shape::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 9999px;
      background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.18), transparent 70%);
    }

    @keyframes shapeIn {
      0%   { opacity: 0; transform: translateY(-80px) rotate(calc(var(--r) - 15deg)); }
      100% { opacity: 1; transform: translateY(0)     rotate(var(--r)); }
    }
    @keyframes float {
      0%,100% { transform: translateY(0)   rotate(var(--r)); }
      50%      { transform: translateY(15px) rotate(var(--r)); }
    }

    /* Shape 1 – indigo, top-left */
    .s1 {
      width: 600px; height: 140px;
      left: -5%; top: 20%;
      background: linear-gradient(to right, rgba(99,102,241,0.15), transparent);
      box-shadow: 0 8px 32px rgba(255,255,255,0.08);
      --r: 12deg;
      animation-delay: 0.3s, 0.3s;
    }
    /* Shape 2 – rose, bottom-right */
    .s2 {
      width: 500px; height: 120px;
      right: 0; top: 75%;
      background: linear-gradient(to right, rgba(244,63,94,0.15), transparent);
      box-shadow: 0 8px 32px rgba(255,255,255,0.08);
      --r: -15deg;
      animation-delay: 0.5s, 0.5s;
    }
    /* Shape 3 – violet, bottom-left */
    .s3 {
      width: 300px; height: 80px;
      left: 10%; bottom: 10%;
      background: linear-gradient(to right, rgba(139,92,246,0.15), transparent);
      box-shadow: 0 8px 32px rgba(255,255,255,0.08);
      --r: -8deg;
      animation-delay: 0.4s, 0.4s;
    }
    /* Shape 4 – amber, top-right */
    .s4 {
      width: 200px; height: 60px;
      right: 20%; top: 15%;
      background: linear-gradient(to right, rgba(245,158,11,0.15), transparent);
      box-shadow: 0 8px 32px rgba(255,255,255,0.08);
      --r: 20deg;
      animation-delay: 0.6s, 0.6s;
    }
    /* Shape 5 – cyan, top-center-left */
    .s5 {
      width: 150px; height: 40px;
      left: 25%; top: 10%;
      background: linear-gradient(to right, rgba(6,182,212,0.15), transparent);
      box-shadow: 0 8px 32px rgba(255,255,255,0.08);
      --r: -25deg;
      animation-delay: 0.7s, 0.7s;
    }

    /* ── Login card ── */
    .login-wrap {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 0;
      animation: fadeUp 1s 0.4s both ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-logo {
      display: flex; align-items: center; gap: 10px;
      justify-content: center; margin-bottom: 2rem;
    }
    .logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 20px; height: 20px; fill: #fff; }
    .logo-name { font-size: 20px; font-weight: 700; letter-spacing: -.5px; color: #fff; }
    .logo-name span { color: #a5b4fc; }

    .login-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 8px 40px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,0.07);
      backdrop-filter: blur(12px);
    }
    .login-title { font-size: 17px; font-weight: 600; margin-bottom: .25rem; color: #fff; }
    .login-sub   { font-size: 13px; color: var(--text-2); margin-bottom: 1.75rem; }

    .form-group { margin-bottom: 1.1rem; }
    .form-label {
      display: block; font-size: 12.5px; font-weight: 500;
      color: var(--text-2); margin-bottom: .4rem; letter-spacing: .01em;
    }
    .form-input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius);
      padding: .65rem .9rem; font-size: 14px; color: #fff;
      outline: none; transition: border-color var(--transition), box-shadow var(--transition);
    }
    .form-input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
    }
    .form-input::placeholder { color: var(--text-3); }

    .btn-login {
      width: 100%; margin-top: 1.5rem;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      border-radius: var(--radius); padding: .75rem;
      font-size: 14px; font-weight: 600; letter-spacing: .02em;
      transition: opacity var(--transition), transform var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover  { opacity: .88; }
    .btn-login:active { transform: scale(.98); }
    .btn-login:disabled { opacity: .5; cursor: not-allowed; }
    .btn-login svg { width: 16px; height: 16px; flex-shrink: 0; }

    .error-msg {
      display: none; margin-top: 1rem;
      background: rgba(226,75,74,.12); border: 1px solid rgba(226,75,74,.3);
      border-radius: var(--radius); padding: .65rem .9rem;
      font-size: 13px; color: #f87171;
    }
    .error-msg.show { display: block; }

    .theme-btn {
      position: fixed; top: 1rem; right: 1rem;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 7px; color: var(--text-2);
      display: flex; align-items: center; justify-content: center;
      transition: background var(--transition);
      z-index: 20;
    }
    .theme-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .theme-btn svg { width: 16px; height: 16px; display: block; }

    .spinner {
      display: none; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
      border-radius: 50%; animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .first-access-link {
      text-align: center; margin-top: 1rem; font-size: 12px; color: var(--text-3);
    }
    .first-access-link a { color: #a5b4fc; text-decoration: none; }
    .first-access-link a:hover { color: #c7d2fe; }
  </style>
</head>
<body>

<!-- Animated background -->
<div class="bg-gradient"></div>
<div class="shapes">
  <div class="shape s1"></div>
  <div class="shape s2"></div>
  <div class="shape s3"></div>
  <div class="shape s4"></div>
  <div class="shape s5"></div>
</div>
<div class="bg-vignette"></div>

<button class="theme-btn" onclick="toggleTheme()" title="Alternar tema">
  <svg id="iconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  <svg id="iconSun"  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
</button>

<div class="login-wrap">
  <div class="login-logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
    </div>
    <span class="logo-name">Bruna<span>Flores</span></span>
  </div>

  <div class="login-card">
    <div class="login-title">Bem-vindo de volta</div>
    <div class="login-sub">Entre com seu usuário e senha para acessar o sistema.</div>

    <form id="loginForm" onsubmit="fazerLogin(event)" autocomplete="off">
      <div class="form-group">
        <label class="form-label" for="f_nome">Usuário</label>
        <input class="form-input" id="f_nome" type="text" placeholder="Nome de usuário" required autocomplete="username" />
      </div>
      <div class="form-group">
        <label class="form-label" for="f_senha">Senha</label>
        <input class="form-input" id="f_senha" type="password" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-login" id="btnLogin">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        <div class="spinner" id="spinner"></div>
        <span id="btnText">Entrar</span>
      </button>
    </form>

    <div class="error-msg" id="errorMsg"></div>
    <div class="first-access-link">
      Primeiro acesso? <a href="primeiro-acesso.html">Configure o administrador aqui</a>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://zpoqwuuomkomgxphmkcn.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_eYE1OsNRUALPKBVWFYDk5g_cDu6Mgor';
  const AUTH_KEY = 'fb_auth';

  let sb = null;

  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    const moon = document.getElementById('iconMoon');
    const sun  = document.getElementById('iconSun');
    if (moon) moon.style.display = t === 'light' ? 'none' : '';
    if (sun)  sun.style.display  = t === 'light' ? '' : 'none';
  }
  function toggleTheme() {
    const cur = document.documentElement.getAttribute('data-theme') || 'dark';
    const next = cur === 'dark' ? 'light' : 'dark';
    localStorage.setItem('theme', next);
    applyTheme(next);
  }

  async function hashSHA256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
  }
  function hideError() {
    document.getElementById('errorMsg').classList.remove('show');
  }

  function setLoading(on) {
    const btn = document.getElementById('btnLogin');
    const txt = document.getElementById('btnText');
    const sp  = document.getElementById('spinner');
    btn.disabled = on;
    txt.textContent = on ? 'Entrando…' : 'Entrar';
    sp.style.display = on ? 'block' : 'none';
  }

  async function fazerLogin(e) {
    e.preventDefault();
    hideError();
    if (!sb) { showError('Servidor indisponível. Verifique sua conexão.'); return; }

    const nome  = document.getElementById('f_nome').value.trim();
    const senha = document.getElementById('f_senha').value;
    if (!nome || !senha) { showError('Preencha usuário e senha.'); return; }

    setLoading(true);
    try {
      const hash = await hashSHA256(senha);
      const { data, error } = await sb
        .from('usuarios')
        .select('id, nome, ativo, permissoes')
        .eq('nome', nome)
        .eq('senha_hash', hash)
        .single();

      if (error) {
        if (error.code === 'PGRST116') {
          showError('Usuário ou senha incorretos.');
        } else if (error.code === '42P01') {
          showError('Tabela de usuários não encontrada. Execute o SQL de configuração no Supabase e acesse primeiro-acesso.html para criar o admin.');
        } else {
          showError('Erro: ' + (error.message || error.code));
        }
        return;
      }
      if (!data) { showError('Usuário ou senha incorretos.'); return; }
      if (!data.ativo) { showError('Usuário inativo. Contate o administrador.'); return; }

      sessionStorage.setItem(AUTH_KEY, JSON.stringify({
        id: data.id,
        nome: data.nome,
        permissoes: data.permissoes || []
      }));

      const perms = data.permissoes || [];
      const pages = ['produtos','clientes','lancamento','pedidos','contas-receber','relatorios','usuarios'];
      const first = pages.find(p => perms.includes(p)) || 'produtos';
      window.location.replace(first + '.html');
    } catch (err) {
      showError('Erro ao conectar. Tente novamente.');
    } finally {
      setLoading(false);
    }
  }

  (function init() {
    applyTheme('dark');

    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.js';
    s.onload = () => {
      sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { auth: { persistSession: false } });
    };
    s.onerror = () => showError('Não foi possível carregar o servidor. Verifique a conexão.');
    document.head.appendChild(s);
  })();
</script>
</body>
</html>
